<html>

<head>
    <title>Positions</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="fixed">Fixed Box</div>

    <h2>Static</h2>
    <div class="box static">Static Box</div>

    <h2>Relative</h2>
    <div class="box normal">Normal Box</div>
    <div class="box relative">Relative Box</div>

    <h2>Absolute</h2>
    <div class="absolute-parent">
        <div class="absolute">Absolute Box</div>
    </div>

    <h2>Sticky</h2>
    <div class="sticky-container">
        <div class="sticky">Sticky Box</div>
        <div class="space"></div>
    </div>

    <div class="null-block"></div>

</body>

</html>
