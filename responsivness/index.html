<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="navbar">
        <div class="logo">My Website</div>
        <div class="links">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </div>
    </div>

    <h2>Grid Layout (4 columns -> 2 columns -> 1 column)</h2>
    <div class="grid-container">
        <div class="box red">Box 1</div>
        <div class="box blue">Box 2</div>
        <div class="box green">Box 3</div>
        <div class="box orange">Box 4</div>
    </div>

    <h2>Flexbox Layout (Wraps automatically)</h2>
    <div class="flex-container">
        <div class="flex-item purple">Flex Item 1</div>
        <div class="flex-item purple">Flex Item 2</div>
        <div class="flex-item purple">Flex Item 3</div>
    </div>

</body>

</html>
